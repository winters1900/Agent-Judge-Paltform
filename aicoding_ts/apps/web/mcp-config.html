<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP 配置</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="mcp-config-page">
      <header class="mcp-config-header">
        <div>
          <p class="eyebrow">MCP Client</p>
          <h1>外部 MCP Server 配置</h1>
          <p class="muted">配置 HTTP 或 stdio 型 MCP server，让 Agent 直接接入外部工具。</p>
        </div>
        <a class="ghost-button" href="/">返回主界面</a>
      </header>

      <section class="panel mcp-config-panel">
        <div class="panel-header">
          <h2>已配置的 Server</h2>
          <button id="refreshMcpBtn" type="button">刷新</button>
        </div>
        <div id="mcpServerList" class="mcp-server-list"></div>
      </section>

      <section class="panel mcp-config-panel">
        <div class="panel-header">
          <h2>新增 / 编辑 Server</h2>
          <button id="saveMcpBtn" type="button">保存到本地</button>
        </div>
        <form id="mcpForm" class="mcp-form">
          <label>
            名称
            <input id="mcpName" type="text" placeholder="github" />
          </label>
          <label>
            类型
            <select id="mcpType">
              <option value="http">HTTP</option>
              <option value="stdio">stdio</option>
            </select>
          </label>
          <label data-field="url">
            URL
            <input id="mcpUrl" type="text" placeholder="http://localhost:4001/mcp" />
          </label>
          <label data-field="command" class="hidden">
            命令
            <input id="mcpCommand" type="text" placeholder="npx" />
          </label>
          <label data-field="args" class="hidden">
            参数（JSON 数组）
            <textarea id="mcpArgs" rows="3" placeholder='["-y", "@modelcontextprotocol/server-filesystem", "."]'></textarea>
          </label>
          <label data-field="headers">
            Headers（JSON）
            <textarea id="mcpHeaders" rows="3" placeholder='{"Authorization":"Bearer xxx"}'></textarea>
          </label>
          <label data-field="env" class="hidden">
            环境变量（JSON）
            <textarea id="mcpEnv" rows="3" placeholder='{"NODE_ENV":"production"}'></textarea>
          </label>
          <label class="checkbox-row">
            <input id="mcpEnabled" type="checkbox" checked />
            启用
          </label>
        </form>
      </section>
    </div>

    <script type="module" src="/mcp-config.js"></script>
  </body>
</html>
