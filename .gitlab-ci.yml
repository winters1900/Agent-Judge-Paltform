# step2_2 Agent 评估 — 单机 Windows Shell Runner（#590）：仅 eval 两 job。
# aicoding_ts 校验与构建使用独立 Shell Runner。

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - step2_2/**/*
        - aicoding_ts/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH
      changes:
        - step2_2/**/*
        - aicoding_ts/**/*
        - .gitlab-ci.yml
    - when: never

stages:
  - build

variables:
  NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"

aicoding_ts:build:
  stage: build
  tags:
    - aicoding_ts
  interruptible: true
  script:
    - |
      $repoDir = (Get-Location).Path
      if (-not (Test-Path -LiteralPath (Join-Path $repoDir 'aicoding_ts'))) {
        $repoDir = 'F:\gitlab-runner-builds\Ux-DjYTyZ\0\greatgroup\software3'
      }
      Set-Location -LiteralPath (Join-Path $repoDir 'aicoding_ts')
    - npm ci
    - npm run build:web
